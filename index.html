<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaytAI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 40px;
      text-align: center;
    }
    .box {
      max-width: 900px;
      margin: auto;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    textarea, select, button {
      width: 90%;
      max-width: 700px;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #020617;
      color: white;
      font-size: 16px;
    }
    button {
      background: #22d3ee;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }
    h1, h2 {
      color: #fbbf24;
    }
    .result {
      text-align: right;
      line-height: 1.9;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 18px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>BaytAI</h1>
    <p>منصة لتحويل الشعر العربي إلى فيديو أو بودكاست بالذكاء الاصطناعي</p>
  </div>

  <div class="box">
    <h2>أدخل الأبيات الشعرية</h2>
    <form method="post" action="/generate">
      <textarea name="poem" rows="6">الخيل والليل والبيداء تعرفني
والسيف والرمح والقرطاس والقلم</textarea>
      <br>
      <select name="output_type">
        <option value="فيديو قصير">فيديو قصير</option>
        <option value="بودكاست">بودكاست</option>
        <option value="فيديو تعليمي">فيديو تعليمي</option>
      </select>
      <br>
      <button type="submit">توليد المحتوى</button>
    </form>
  </div>

  {% if result %}
  <div class="box">
    <h2>النتيجة</h2>
    <div class="result">
      <strong>القصيدة:</strong><br>
      {{ result.poem }}
      <br><br>

      <strong>نوع المخرج:</strong>
      {{ result.output_type }}
      <br><br>

      <strong>الثيمة المستخرجة:</strong>
      {{ result.theme }}
      <br><br>

      <strong>سيناريو الفيديو المقترح:</strong><br>
      {{ result.script }}
    </div>
  </div>
  {% endif %}

</body>
</html>
